
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralPrep | AI Neural Study Platform</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; background: #020617; }
        .font-brand { font-family: 'Outfit', sans-serif; }
        .font-signature { font-family: 'Dancing Script', cursive; }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-thick {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        /* DYNAMIC BACKGROUND ANIMATIONS */
        
        /* 1. Deep Space: Particle Field */
        @keyframes drift {
            from { transform: translateY(0px) rotate(0deg); }
            to { transform: translateY(-1000px) rotate(360deg); }
        }
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
            animation: drift linear infinite;
        }

        /* 2. Crimson Flash: Heat Distortion */
        .distort-filter {
            filter: url(#heat-distortion);
        }
        @keyframes ripple {
          0% { transform: scale(1) translate(0, 0); }
          50% { transform: scale(1.1) translate(10px, -10px); }
          100% { transform: scale(1) translate(0, 0); }
        }
        .heat-haze {
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(circle at 50% 50%, rgba(225, 29, 72, 0.1) 0%, transparent 70%);
            animation: ripple 10s infinite alternate ease-in-out;
            pointer-events: none;
        }

        /* 3. Emerald Light: Bio-luminescent Pulse */
        @keyframes bio-pulse {
            0%, 100% { opacity: 0.2; transform: scale(1); filter: blur(40px); }
            50% { opacity: 0.5; transform: scale(1.3); filter: blur(60px); }
        }
        .bio-orb {
            position: absolute;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 50%;
            filter: blur(40px);
            animation: bio-pulse 8s infinite ease-in-out;
            pointer-events: none;
        }

        .perspective-1000 { perspective: 1000px; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        .transform-style-3d { transform-style: preserve-3d; }
        
        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient {
            background-size: 400% 400%;
            animation: gradient-xy 15s ease infinite;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        
        .scroll-slim::-webkit-scrollbar { width: 4px; }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "tone": "https://esm.sh/tone@^15.1.22",
    "fflate": "https://esm.sh/fflate@0.8.2",
    "framer-motion": "https://esm.sh/framer-motion@^11.11.11"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="overflow-x-hidden bg-slate-950">
    <!-- SVG Filter for Heat Distortion -->
    <svg style="visibility: hidden; position: absolute;" width="0" height="0">
        <filter id="heat-distortion">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.05" numOctaves="2" result="noise" seed="2">
                <animate attributeName="baseFrequency" values="0.01 0.05;0.01 0.08;0.01 0.05" dur="10s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
        </filter>
    </svg>

    <div id="root"></div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Neural SW Active:', reg.scope))
                    .catch(err => console.log('Neural SW Offline:', err));
            });
        }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
